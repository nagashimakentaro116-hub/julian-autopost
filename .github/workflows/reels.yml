name: Julian Reels Post

on:
  schedule:
    # Monday 7:00 PM ET = Tuesday 00:00 UTC
    - cron: '0 0 * * 2'
    # Wednesday 7:00 PM ET = Thursday 00:00 UTC
    - cron: '0 0 * * 4'
    # Friday 7:00 PM ET = Saturday 00:00 UTC
    - cron: '0 0 * * 6'
    # One-time: May 1 7:00 PM ET = May 1 23:00 UTC
    - cron: '0 23 1 5 *'
    # One-time: May 3 7:00 PM ET = May 3 23:00 UTC
    - cron: '0 23 3 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-reel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install requests

      - name: Post Reel to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python post_reels.py

      - name: Commit posted_reels.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_reels.txt
          git diff --cached --quiet || git commit -m "Record posted reel [skip ci]"
          git push
