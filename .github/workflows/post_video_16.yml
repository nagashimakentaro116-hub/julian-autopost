name: Post Video 16

on:
  schedule:
    - cron: '0 11 6 5 *'  # May 6, 7AM EDT (11:00 UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Post video to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VIDEO_URL: "https://github.com/nagashimakentaro116-hub/julian-autopost/releases/download/v-video-16-20260503213645/16.mp4"
        run: python post_video_once.py
